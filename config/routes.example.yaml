# Route rules: map request hosts to exit groups, with optional quality tiers.
#
# Primary profile: overseas-stable (Availability-First)
# ---------------------------------------------------------------------------
# Matching: longest domain suffix wins. A bare domain like "github.com"
# matches that host and any subdomain (api.github.com). A "*.cn" entry
# matches any host ending in ".cn". The special entry "default" marks the
# fallback group for unmatched hosts.
#
# Quality tiers (exit order)
#   any       FreePool → Warp → Xray → NoProxy   (may borrow higher exits)
#   standard  Xray → Warp → FreePool → NoProxy   (free pool allowed late)
#   premium   Xray → Warp → NoProxy              (NEVER free_pool)
#
# Direct-only: group name `direct` (or any group without a tier and without
# an exits override) uses Direct only — not one of the three tiers.
#
# Default tier when `tier` is omitted (legacy list form or extended form):
#   direct      → Direct only
#   free_pool   → any
#   warp / xray → premium
#   other names → any  (safe default; avoid surprise NoProxy storms)
#
# Default match + GeoIP (when GeoIP is configured and default group is NOT
# direct-only):
#   domestic (e.g. CN) → Direct
#   overseas / UNKNOWN → default group's tier exits (below: premium)
# Without GeoIP, unmatched hosts use the default group's policy only.
#
# L1 dependency: premium ends in NoProxy. Deploy healthy WARP and/or active
# xray nodes, or gateway may return 502 instead of leaking via Direct.
# See docs/ROADMAP.md Availability-First and scenario-quality-tiers spec.
#
# ---------------------------------------------------------------------------
# Alternate profile (commented): domestic-friendly
# ---------------------------------------------------------------------------
# groups:
#   direct:
#     domains:
#       - "*.cn"
#       - default        # unmatched also Direct; no GeoIP rewrite of direct-only
#   free_pool:
#     tier: any
#     domains:
#       - "github.com"
#   overseas:
#     tier: premium
#     domains:
#       - "openai.com"

groups:
  direct:
    # Direct-only (no tier). Domestic TLDs only — do NOT put default here
    # for overseas-stable.
    domains:
      - "*.cn"

  overseas:
    # Unmatched hosts land here (default). premium: Xray → Warp → NoProxy.
    # With GeoIP: domestic unmatched → Direct; overseas unmatched → this table.
    tier: premium
    domains:
      - default

  free_pool:
    # Explicit dirty-ok hosts only. Never put `default` here for overseas-stable.
    tier: any
    domains:
      - "github.com"
      - "google.com"
      - "*.googleapis.com"

  warp:
    # Explicit premium hosts (optional). Default tier for name `warp` is premium.
    tier: premium
    domains:
      - "cloudflare.com"

  # Example premium scenario: high-value targets never use free_pool dirty IPs.
  # openai:
  #   tier: premium
  #   domains:
  #     - "openai.com"
  #     - "chatgpt.com"
  #
  # Example standard scenario: prefer encrypted exits, free_pool still allowed.
  # standard_web:
  #   tier: standard
  #   domains:
  #     - "example.com"
