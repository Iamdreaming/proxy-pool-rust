# all validation targets.  The recommended min_score of 0.35 ensures a proxy
# needs at least ~2 s latency with decent success rate and anonymity.
#
# When xray is enabled with ≥ 3 active nodes and WARP is healthy, the pool
# tier is "stable" — indicating reliable overseas exit capacity.
# See docs/ops-cleanup.md for tier semantics and cleanup guidance.
