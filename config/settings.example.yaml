# proxy-pool-rust configuration
# All fields have defaults; only override what you need.

gateway:
  listen_host: "0.0.0.0"
  listen_port: 9080

api:
  listen_host: "0.0.0.0"
  listen_port: 8000

mcp:
  transport: "both"          # stdio | http | both
  http_port: 9000

redis:
  url: "redis://redis:6379/0"

pool:
  fetch_interval_sec: 300
  validate_interval_sec: 600
  validate_concurrency: 50
  validate_timeout_sec: 15
  validate_target_url: "https://www.cloudflare.com/cdn-cgi/trace"
  # Optional strict multi-target admission. When set, a fetched proxy must pass
  # every target below before it is stored. Omit to keep validate_target_url.
  # validate_target_urls:
  #   - "https://www.cloudflare.com/cdn-cgi/trace"
  #   - "https://httpbin.org/ip"
  # Optional structured targets. Leave expected_statuses empty to accept any
  # status below 400. Configure statuses such as 401 when auth failure proves
  # the target was reached.
  # validate_targets:
  #   - url: "https://www.cloudflare.com/cdn-cgi/trace"
  #   - url: "https://api.openai.com/v1/models"
  #     expected_statuses: [401]
  min_score: 0.3
  # Admission policy for multi-target validation:
  #   quorum  — any target passing admits the proxy (default)
  #   strict  — all targets must pass for admission
  target_admission: quorum
  pace_rate_per_sec: 10      # 0 = unlimited; 10 recommended to avoid socket exhaustion
  score_weights:
    latency: 0.5
    success: 0.3
    anonymity: 0.2
  fetchers:
    # Optional: prefix for mirroring GitHub raw URLs (e.g. gh-proxy).
    # When set, raw.githubusercontent.com URLs are prefixed with this value.
    # github_mirror_prefix: "https://v4.gh-proxy.org/"
    # Optional: prefix for mirroring non-GitHub URLs that may be blocked.
    # mirror_prefix: "https://v4.gh-proxy.org/"
    proxyscrape: { enabled: true }
    thespeedx: { enabled: true }
    free_proxy_list: { enabled: true }
    clarketm: { enabled: true }
    geonode: { enabled: true }
    proxifly: { enabled: true }
    databay: { enabled: true }
    iplocate: { enabled: true }
    vpslab: { enabled: true }
    monosans: { enabled: true }

warp:
  instances:
    - { id: 1, host: "127.0.0.1", port: 1081 }
    - { id: 2, host: "127.0.0.1", port: 1082 }
    - { id: 3, host: "127.0.0.1", port: 1083 }
  health_check_interval_sec: 30
  health_check_timeout_sec: 10
  health_check_url: "https://www.cloudflare.com/cdn-cgi/trace"
  health_check_fail_threshold: 3
  optimizer:
    enabled: true
    interval_sec: 21600           # 6h
    scan_ports: [2408, 500, 1701, 4500]
    max_loss_pct: 10
    scan_threads: 100
    assign: distinct              # distinct | shared
    compose_file: deploy/warp/docker-compose.yml
    scan_data_dir: deploy/warp/scan-data
    state_path: deploy/warp/state.json
    health_timeout_sec: 30

geoip:
  database_path: "/app/geoip/GeoLite2-Country.mmdb"
  cache_ttl_sec: 86400
  domestic_countries: ["CN"]

free_pool:
  max_retry: 3

xray:
  enabled: false
  binary_path: "xray"
  api_port: 10085
  port_range_start: 20000
  port_range_end: 29999
  sync_interval_sec: 30
  max_active_nodes: 5000
  # Optional xray admission filtering. When validate_targets is empty, xray
  # reuses pool.effective_validate_targets().
  validate_timeout_sec: 15
  validation_attempt_limit_per_cycle: 50
  validation_failure_cooldown_sec: 600
  # validate_targets:
  #   - url: "https://www.youtube.com/generate_204"
  #     expected_statuses: [204]
  #   - url: "https://www.google.com/generate_204"
  #     expected_statuses: [204]
  #   - url: "https://www.cloudflare.com/cdn-cgi/trace"

# Optional public subscription source pack.
# Keep these disabled/commented until an operator previews the source quality.
# See docs/subscription-source-packs.md for rollout and rollback guidance.
#
# subscription:
#   urls:
#     # Curated raw subscription URLs. Add only reviewed public raw URLs here.
#     # - "https://raw.githubusercontent.com/example/repo/main/clash.yaml"
#   github:
#     enabled: false
#     max_results: 5
#     # token: "__PROXY_POOL_REDACTED__"  # optional GitHub PAT for rate limits
#     keywords:
#       - "clash free sub"
#       - "v2ray free nodes"
#       - "free vpn subscriptions clash"
#   search:
#     # LLM web-search (grok) candidate lane. Low-trust; links go through the
#     # normal validate-then-admit pipeline. See docs/subscription-source-packs.md.
#     enabled: false
#     mcp_url: "http://host:33000/mcp/search"
#     # tool_name: ""      # empty → "grok-search-web_search"
#     # auth_token: ""     # empty → read SEARCH_MCP_TOKEN env var (keep tokens out of yaml)
#     # queries: []        # empty → built-in default queries
#     max_queries: 3
#   aggregators:
#     # Aggregator list URL. Supported formats: text, json, yaml.
#     # - url: "https://raw.githubusercontent.com/example/repo/main/subscriptions.txt"
#     #   format: "text"

# ── Overseas profile example ──────────────────────────────────────────────
