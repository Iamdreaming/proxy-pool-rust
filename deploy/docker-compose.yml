services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  proxy-pool:
    # Pull pre-built image from GHCR (built by GitHub Actions)
    image: ghcr.io/iamdreaming/proxy-pool-rust:latest
    # To build locally instead, comment the image line above and uncomment:
    # build:
    #   context: ..
    #   dockerfile: deploy/Dockerfile
    #   args:
    #     GIT_HASH: dev
    container_name: proxy-pool
    ports:
      - "9080:9080"   # Gateway (HTTP CONNECT + SOCKS5)
      - "8000:8000"   # REST API
      - "9000:9000"   # MCP HTTP transport
    depends_on:
      - redis
    volumes:
      - ../config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock  # For MCP update_service & WARP optimizer
    environment:
      - RUST_LOG=info
      - PROXY_POOL_CONFIG=/app/config/settings.yaml
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
          pids: 512

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --http-api-update --cleanup --label-enable
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=proxy-pool-update
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  redis_data:
