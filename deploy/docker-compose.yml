services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  proxy-pool:
    # Pre-built image, built by GitHub Actions and pushed to ghcr.io; pulled via
    # the NJU GHCR mirror (ghcr.nju.edu.cn) for reliable access from China.
    image: ghcr.nju.edu.cn/iamdreaming/proxy-pool-rust:latest
    # To build locally instead, comment the image line above and uncomment:
    # build:
    #   context: ..
    #   dockerfile: deploy/Dockerfile
    #   args:
    #     GIT_HASH: unknown
    container_name: proxy-pool
    ports:
      - "9080:9080" # Gateway (HTTP CONNECT + SOCKS5)
      - "8000:8000" # REST API
    depends_on:
      - redis
    volumes:
      - ../config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock # For WARP optimizer
    environment:
      - RUST_LOG=info
      - PROXY_POOL_CONFIG=/app/config/settings.yaml
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
          pids: 512

  proxy-mcp:
    # Standalone MCP server (same image, different binary). Decoupled from
    # proxy-pool so triggering update_service does not kill the MCP responder.
    image: ghcr.nju.edu.cn/iamdreaming/proxy-pool-rust:latest
    command: ["/app/proxy-mcp-server"]
    container_name: proxy-mcp
    ports:
      - "9000:9000" # MCP HTTP transport
    depends_on:
      - redis
      - proxy-pool
    volumes:
      - ../config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock # For MCP update_service
    environment:
      - RUST_LOG=info
      - PROXY_POOL_CONFIG=/app/config/settings.yaml
      - MCP_UPSTREAM_API_URL=http://proxy-pool:8000
      - MCP_HTTP_PORT=9000
      # update_service targets the sibling proxy-pool container via Watchtower.
      - PROXY_POOL_UPDATE_ENABLED=true
      - PROXY_POOL_UPDATE_DOCKER_SOCKET=/var/run/docker.sock
      - PROXY_POOL_UPDATE_CONTAINER=proxy-pool
      - PROXY_POOL_UPDATE_IMAGE=ghcr.nju.edu.cn/iamdreaming/proxy-pool-rust:latest
      - PROXY_POOL_UPDATE_WATCHTOWER_URL=http://watchtower-proxy-pool:8080/v1/update
      - PROXY_POOL_UPDATE_TOKEN=${PROXY_POOL_UPDATE_TOKEN:-proxy-pool-update}
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  watchtower-proxy-pool:
    image: containrrr/watchtower
    container_name: watchtower-proxy-pool
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --http-api-update --cleanup --label-enable
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${PROXY_POOL_UPDATE_TOKEN:-proxy-pool-update}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  redis_data:
