version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  proxy-pool:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "9080:9080"   # Gateway (HTTP CONNECT + SOCKS5)
      - "8000:8000"   # REST API
      - "9000:9000"   # MCP HTTP transport
    depends_on:
      - redis
    volumes:
      - ../config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock  # For WARP optimizer
    environment:
      - RUST_LOG=info
      - PROXY_POOL_CONFIG=/app/config/settings.yaml
    restart: unless-stopped

volumes:
  redis_data:
